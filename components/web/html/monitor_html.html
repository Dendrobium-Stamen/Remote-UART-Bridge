<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>System Monitor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#7c6baa;--primary-light:#9a8abf;--primary-lighter:#c4b5e0;
  --bg:#f5f0fa;--bg-card:#fff;--text:#4a4060;--text-muted:#b8aed0;
  --border:#e8e0f5;--border-light:#f0ecf8;--danger:#d4a0b0;
  --success:#7abf8a;--info:#7aaabf;
  --shadow-sm:0 1px 3px rgba(124,107,170,.08);
  --shadow-md:0 4px 12px rgba(124,107,170,.12);
  --shadow-lg:0 8px 30px rgba(124,107,170,.18);
  --radius:12px;--transition:all .25s cubic-bezier(.4,0,.2,1);
}
body{font-family:'SF Mono',SFMono-Regular,Consolas,'Liberation Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 20%,rgba(196,181,224,.25) 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(154,138,191,.15) 0%,transparent 50%);z-index:-1;animation:bgFloat 20s ease-in-out infinite alternate;pointer-events:none}
@keyframes bgFloat{0%{transform:translate(0,0)}100%{transform:translate(-3%,-3%)}}

/* Nav */
.nav{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;border-bottom:1px solid var(--border);background:rgba(255,255,255,.6);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);position:sticky;top:0;z-index:50;animation:slideDown .4s ease-out}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.nav-title{font-size:18px;font-weight:bold;color:var(--primary)}
.nav a{color:var(--text-muted);text-decoration:none;font-size:13px;padding:6px 12px;border-radius:8px;transition:var(--transition)}
.nav a:hover{color:var(--primary);background:rgba(124,107,170,.06)}
.nav a.active{color:var(--primary);background:rgba(124,107,170,.1);font-weight:600}

.container{max-width:620px;margin:0 auto;padding:24px 20px}

/* 2x2 Grid */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}

/* Cards */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow-sm);transition:var(--transition);animation:fadeUp .5s ease-out backwards}
.card:nth-child(1){animation-delay:.05s}
.card:nth-child(2){animation-delay:.1s}
.card:nth-child(3){animation-delay:.15s}
.card:nth-child(4){animation-delay:.2s}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.card:hover{box-shadow:var(--shadow-md);border-color:var(--primary-lighter);transform:translateY(-1px)}
.card-label{color:var(--primary-light);font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;font-weight:600;display:flex;align-items:center;gap:6px}

.card-value{font-size:30px;color:var(--primary);font-weight:bold;line-height:1.2}
.card-value small{font-size:14px;color:var(--text-muted);font-weight:400}
.card-sub{color:var(--text-muted);font-size:11px;margin-top:6px}

/* Stat bars */
.bar{background:var(--border-light);border-radius:6px;height:6px;margin-top:10px;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;transition:width .6s cubic-bezier(.4,0,.2,1);position:relative}
.bar-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);animation:shimmer 2s ease-in-out infinite}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.bar-normal{background:linear-gradient(90deg,var(--primary-lighter),var(--primary-light))}
.bar-warn{background:linear-gradient(90deg,#e0c090,#d4a060)}
.bar-danger{background:linear-gradient(90deg,var(--danger),#c07080)}

/* Upload */
.upload-card{animation-delay:.25s}
.upload-area{border:2px dashed var(--border);border-radius:var(--radius);padding:24px 18px;text-align:center;background:var(--bg);cursor:pointer;transition:var(--transition);margin-bottom:14px}
.upload-area:hover{border-color:var(--primary-light);background:rgba(124,107,170,.03);transform:scale(1.01)}
.upload-area.drag-over{border-color:var(--primary);background:rgba(124,107,170,.08);transform:scale(1.02);box-shadow:0 0 0 4px rgba(124,107,170,.1)}
.upload-area svg{margin-bottom:8px;transition:transform .3s ease}
.upload-area:hover svg{transform:translateY(-3px)}
.upload-area p{color:var(--primary-light);font-size:12px;transition:var(--transition)}
.upload-area:hover p{color:var(--primary)}

.progress-bar{background:var(--border-light);border-radius:6px;height:6px;margin-bottom:10px;overflow:hidden}
.progress-fill{background:linear-gradient(90deg,var(--primary-lighter),var(--primary-light),var(--primary));height:100%;border-radius:6px;transition:width .3s cubic-bezier(.4,0,.2,1);position:relative}
.progress-fill.complete{background:linear-gradient(90deg,var(--success),#5aaf6a)}
.upload-footer{display:flex;justify-content:space-between;align-items:center}
.upload-footer span{color:var(--text-muted);font-size:11px}

/* Button */
.btn{background:linear-gradient(135deg,var(--primary-light),var(--primary));color:#fff;border:none;border-radius:8px;padding:8px 22px;cursor:pointer;font-size:12px;font-family:inherit;box-shadow:0 2px 8px rgba(124,107,170,.25);transition:var(--transition);position:relative;overflow:hidden}
.btn:hover{box-shadow:0 4px 16px rgba(124,107,170,.35);transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,.2);transform:scaleX(0);transform-origin:left;transition:transform .3s ease}
.btn:active::after{transform:scaleX(1);transition:transform .05s}

/* Pulse dot */
.status-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--success);margin-right:6px;animation:dotPulse 2s ease-in-out infinite}
@keyframes dotPulse{0%,100%{opacity:.4;box-shadow:0 0 0 0 rgba(122,191,138,.4)}50%{opacity:1;box-shadow:0 0 0 4px rgba(122,191,138,0)}}

/* Icon in card label */
.card-icon{width:14px;height:14px;opacity:.6}
</style>
</head>
<body>
<div class="nav">
  <div class="nav-title"><span class="status-dot"></span>System Monitor</div>
  <div style="display:flex;gap:4px">
    <a href="/monitor" class="active">&#10047; Monitor</a>
    <a href="/espnow">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:2px"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
      ESP-NOW
    </a>
  </div>
</div>
<div class="container">
  <div class="grid">
    <div class="card">
      <div class="card-label">
        <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M9 9h6v6H9z"/><path d="M9 1v3M15 1v3M9 20v3M15 20v3M20 9h3M20 14h3M1 9h3M1 14h3"/></svg>
        Free Heap
      </div>
      <div class="card-value" id="heap">--<small> KB</small></div>
      <div class="bar"><div class="bar-fill bar-normal" id="heap-bar" style="width:0%"></div></div>
    </div>
    <div class="card">
      <div class="card-label">
        <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Uptime
      </div>
      <div class="card-value" id="uptime" style="font-size:26px">--:--:--</div>
    </div>
    <div class="card">
      <div class="card-label">
        <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/></svg>
        Temperature
      </div>
      <div class="card-value" id="temp">--<small> °C</small></div>
      <div class="bar"><div class="bar-fill bar-normal" id="temp-bar" style="width:0%"></div></div>
    </div>
    <div class="card">
      <div class="card-label">
        <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        SDK Version
      </div>
      <div class="card-value" id="sdk" style="font-size:13px;line-height:1.4">--</div>
      <div class="card-sub" id="chip">--</div>
    </div>
  </div>
  <div class="card upload-card">
    <div class="card-label">
      <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Firmware Upgrade
    </div>
    <div class="upload-area" id="drop-zone">
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--primary-light)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><polyline points="9 15 12 12 15 15"/></svg>
      <p>Click or drag .bin file here</p>
    </div>
    <input type="file" id="file-input" accept=".bin" style="display:none">
    <div class="progress-bar"><div class="progress-fill" id="ota-progress" style="width:0%"></div></div>
    <div class="upload-footer">
      <span id="file-name">No file selected</span>
      <button class="btn" id="upgrade-btn">Upgrade</button>
    </div>
  </div>
</div>
<script>
var _uptimeBase=null;
var _uptimeAt=null;

function parseUptime(s){
  var p=s.split(':');return (+p[0])*3600+(+p[1])*60+(+p[2]);
}
function fmtUptime(sec){
  var h=Math.floor(sec/3600)%100;
  var m=Math.floor(sec%3600/60);
  var s=Math.floor(sec%60);
  return (h<10?'0':'')+h+':'+(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
}
function tickUptime(){
  if(_uptimeBase!==null){
    var elapsed=Math.floor((Date.now()-_uptimeAt)/1000);
    document.getElementById('uptime').textContent=fmtUptime(_uptimeBase+elapsed);
  }
}
setInterval(tickUptime,1000);

function updateStatus(){
  fetch('/api/system/status').then(r=>r.json()).then(d=>{
    if(d.heap!==undefined){
      document.getElementById('heap').innerHTML=d.heap+'<small> KB</small>';
      var heapBar=document.getElementById('heap-bar');
      var heapPct=Math.min(d.heap/300*100,100);
      heapBar.style.width=heapPct+'%';
      heapBar.className='bar-fill '+(d.heap<50?'bar-danger':d.heap<100?'bar-warn':'bar-normal');
    }
    if(d.uptime){
      _uptimeBase=parseUptime(d.uptime);
      _uptimeAt=Date.now();
      document.getElementById('uptime').textContent=d.uptime;
    }
    if(d.temp!==undefined){
      document.getElementById('temp').innerHTML=d.temp.toFixed(1)+'<small> °C</small>';
      var tempBar=document.getElementById('temp-bar');
      var tempPct=Math.min(Math.max(d.temp,0)/80*100,100);
      tempBar.style.width=tempPct+'%';
      tempBar.className='bar-fill '+(d.temp>70?'bar-danger':d.temp>50?'bar-warn':'bar-normal');
    }
    if(d.sdk)document.getElementById('sdk').textContent=d.sdk;
    if(d.chip)document.getElementById('chip').textContent=d.chip;
  }).catch(function(){});
}
updateStatus();
setInterval(updateStatus,5000);

var dropZone=document.getElementById('drop-zone');
var fileInput=document.getElementById('file-input');
var upgradeBtn=document.getElementById('upgrade-btn');
var otaProgress=document.getElementById('ota-progress');

dropZone.onclick=()=>fileInput.click();
dropZone.ondragover=e=>{e.preventDefault();dropZone.classList.add('drag-over')};
dropZone.ondragleave=()=>dropZone.classList.remove('drag-over');
dropZone.ondrop=e=>{e.preventDefault();dropZone.classList.remove('drag-over');if(e.dataTransfer.files.length)handleFile(e.dataTransfer.files[0])};
fileInput.onchange=()=>{if(fileInput.files.length)handleFile(fileInput.files[0])};

function handleFile(f){
  document.getElementById('file-name').textContent=f.name+' ('+(f.size/1024).toFixed(1)+' KB)';
  upgradeBtn.dataset.file=f;
  otaProgress.style.width='0%';
  otaProgress.classList.remove('complete');
}

upgradeBtn.onclick=()=>{
  var f=upgradeBtn.dataset.file;
  if(!f)return;
  upgradeBtn.disabled=true;upgradeBtn.textContent='Uploading...';
  var fd=new FormData();fd.append('file',f);
  var xhr=new XMLHttpRequest();
  xhr.open('POST','/api/ota/upload');
  xhr.upload.onprogress=e=>{
    if(e.lengthComputable){
      var pct=e.loaded/e.total*100;
      otaProgress.style.width=pct+'%';
      if(pct>=100)otaProgress.classList.add('complete');
    }
  };
  xhr.onload=()=>{
    upgradeBtn.disabled=false;upgradeBtn.textContent='Upgrade';
  };
  xhr.onerror=()=>{
    upgradeBtn.disabled=false;upgradeBtn.textContent='Upgrade';
  };
  xhr.send(fd);
};
</script>
</body>
</html>
