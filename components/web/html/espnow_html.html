<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ESP-NOW Manager</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:monospace;background:#f5f0fa;color:#4a4060;min-height:100vh}
.nav{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-bottom:1px solid #e0d8f0}
.nav-title{font-size:18px;font-weight:bold;color:#7c6baa;display:flex;align-items:center;gap:6px}
.nav a{color:#b8aed0;text-decoration:none;font-size:13px}
.nav a.active{color:#7c6baa;border-bottom:2px solid #c4b5e0;padding-bottom:2px}
.container{max-width:600px;margin:0 auto;padding:20px}
.card{background:#fff;border:1px solid #e8e0f5;border-radius:10px;padding:14px;margin-bottom:14px}
.card-label{color:#9a8abf;font-size:11px;text-transform:uppercase;margin-bottom:8px}
.btn{border:none;border-radius:8px;padding:8px 16px;cursor:pointer;font-size:12px;font-family:monospace}
.btn-primary{background:#9a8abf;color:#fff}
.btn-outline{background:#fff;color:#9a8abf;border:1px solid #d8d0e8}
.btn-group{display:flex;gap:10px;margin-bottom:14px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{color:#b8aed0;border-bottom:1px solid #f0ecf8;text-align:left;padding:4px 8px}
td{padding:6px 8px;border-bottom:1px solid #f5f0fa}
td.mac{color:#7c6baa}
.tag{background:#f0ecf8;padding:2px 8px;border-radius:6px;color:#7c6baa;font-size:11px}
.remove{color:#d4a0b0;cursor:pointer;font-size:13px}
.mode-btn{padding:3px 12px;border-radius:6px;font-size:11px;cursor:pointer;border:none;font-family:monospace}
.mode-active{background:#9a8abf;color:#fff}
.mode-inactive{background:#f0ecf8;color:#9a8abf;border:1px solid #d8d0e8}
input[type=text]{background:#fcfafd;border:1px solid #e0d8f0;border-radius:8px;padding:6px 10px;color:#4a4060;font-size:12px;font-family:monospace;flex:1}
.log-box{background:#f8f5fc;border:1px solid #e8e0f5;border-radius:8px;padding:8px;font-size:11px;color:#b8aed0;max-height:120px;overflow-y:auto}
.log-entry{color:#7c6baa;margin-bottom:2px}
.send-row{display:flex;gap:8px;margin-bottom:10px}
.empty{text-align:center;padding:6px;color:#c4b5e0;font-size:11px}
</style>
</head>
<body>
<div class="nav">
  <div class="nav-title">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#7c6baa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
    ESP-NOW Manager
  </div>
  <div>
    <a href="/monitor">&#10047; Monitor</a>
    <a href="/espnow" class="active" style="margin-left:16px">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:2px"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
      ESP-NOW
    </a>
  </div>
</div>
<div class="container">
  <div class="btn-group">
    <button class="btn btn-primary" onclick="doScan()">Scan</button>
    <button class="btn btn-outline" onclick="showAddDialog()">+ Add</button>
  </div>

  <div class="card">
    <div class="card-label">Scanned Devices</div>
    <div class="empty" id="scan-results">Click "Scan" to discover nearby devices</div>
  </div>

  <div class="card">
    <div class="card-label">Peer List</div>
    <table>
      <thead><tr><th>MAC</th><th>Label</th><th></th></tr></thead>
      <tbody id="peer-list"></tbody>
    </table>
    <div class="empty" id="peer-empty" style="display:none">No peers added</div>
  </div>

  <div class="card">
    <div class="card-label">Send / Receive Test</div>
    <div style="margin-bottom:10px">
      <span style="color:#b8aed0;font-size:11px">Mode:</span>
      <button class="mode-btn mode-active" id="mode-unicast" onclick="setMode('unicast')">Unicast</button>
      <button class="mode-btn mode-inactive" id="mode-multicast" onclick="setMode('multicast')">Multicast</button>
    </div>
    <div class="send-row">
      <input type="text" id="target-mac" placeholder="Target MAC">
      <button class="btn btn-primary" onclick="doTestSend()">Send</button>
    </div>
    <div class="log-box" id="recv-log">
      <div style="color:#b8aed0">// Receive log</div>
    </div>
  </div>
</div>

<div id="add-dialog" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.3);z-index:100">
  <div style="background:#fff;border-radius:10px;padding:20px;max-width:400px;margin:80px auto;border:1px solid #e8e0f5">
    <div class="card-label" style="margin-bottom:10px">Add Peer</div>
    <input type="text" id="add-mac" placeholder="AA:BB:CC:DD:EE:FF" style="width:100%;margin-bottom:8px">
    <input type="text" id="add-label" placeholder="Label (optional)" style="width:100%;margin-bottom:12px">
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-outline" onclick="hideAddDialog()">Cancel</button>
      <button class="btn btn-primary" onclick="doAddPeer()">Add</button>
    </div>
  </div>
</div>

<script>
var currentMode='unicast';
function loadPeers(){
  fetch('/api/espnow/peers').then(r=>r.json()).then(d=>{
    var tbody=document.getElementById('peer-list');
    var empty=document.getElementById('peer-empty');
    if(!d.peers||!d.peers.length){tbody.innerHTML='';empty.style.display='block';return}
    empty.style.display='none';
    tbody.innerHTML=d.peers.map(p=>'<tr><td class="mac">'+p.mac+'</td><td><span class="tag">'+p.label+'</span></td><td><span class="remove" onclick="doRemove(\''+p.mac+'\')">&#10005;</span></td></tr>').join('');
  }).catch(()=>{});
}
function doScan(){
  document.getElementById('scan-results').textContent='Scanning...';
  fetch('/api/espnow/scan',{method:'POST'}).then(r=>r.json()).then(d=>{
    if(d.devices&&d.devices.length){
      document.getElementById('scan-results').innerHTML=d.devices.map(d=>'<div style="padding:4px 0"><span class="mac">'+d.mac+'</span> <span style="color:#b8aed0">RSSI: '+d.rssi+'</span> <span class="tag" style="cursor:pointer" onclick="addFromScan(\''+d.mac+'\')">+ Add</span></div>').join('');
    }else{
      document.getElementById('scan-results').textContent='No devices found';
    }
  }).catch(()=>{document.getElementById('scan-results').textContent='Scan failed'});
}
function addFromScan(mac){document.getElementById('add-mac').value=mac;showAddDialog()}
function showAddDialog(){document.getElementById('add-dialog').style.display='block'}
function hideAddDialog(){document.getElementById('add-dialog').style.display='none';document.getElementById('add-mac').value='';document.getElementById('add-label').value=''}
function doAddPeer(){
  var mac=document.getElementById('add-mac').value;
  var label=document.getElementById('add-label').value;
  fetch('/api/espnow/peer/add',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mac:mac,label:label||mac})}).then(r=>r.json()).then(()=>{hideAddDialog();loadPeers()}).catch(()=>{});
}
function doRemove(mac){
  fetch('/api/espnow/peer/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mac:mac})}).then(r=>r.json()).then(()=>loadPeers()).catch(()=>{});
}
function setMode(m){
  currentMode=m;
  document.getElementById('mode-unicast').className='mode-btn '+(m==='unicast'?'mode-active':'mode-inactive');
  document.getElementById('mode-multicast').className='mode-btn '+(m==='multicast'?'mode-active':'mode-inactive');
  fetch('/api/espnow/mode',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mode:m})}).catch(()=>{});
}
function doTestSend(){
  var mac=document.getElementById('target-mac').value;
  fetch('/api/espnow/test/send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mac:mac,data:'PING'})}).catch(()=>{});
}
loadPeers();
setInterval(loadPeers,10000);
</script>
</body>
</html>
