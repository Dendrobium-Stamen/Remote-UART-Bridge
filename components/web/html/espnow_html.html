<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ESP-NOW Manager</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#7c6baa;--primary-light:#9a8abf;--primary-lighter:#c4b5e0;
  --bg:#f5f0fa;--bg-card:#fff;--text:#4a4060;--text-muted:#b8aed0;
  --border:#e8e0f5;--border-light:#f0ecf8;--danger:#d4a0b0;
  --success:#7abf8a;
  --shadow-sm:0 1px 3px rgba(124,107,170,.08);
  --shadow-md:0 4px 12px rgba(124,107,170,.12);
  --shadow-lg:0 8px 30px rgba(124,107,170,.18);
  --radius:12px;--transition:all .25s cubic-bezier(.4,0,.2,1);
}
body{font-family:'SF Mono',SFMono-Regular,Consolas,'Liberation Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 20%,rgba(196,181,224,.25) 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(154,138,191,.15) 0%,transparent 50%);z-index:-1;animation:bgFloat 20s ease-in-out infinite alternate;pointer-events:none}
@keyframes bgFloat{0%{transform:translate(0,0)}100%{transform:translate(-3%,-3%)}}

.nav{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;border-bottom:1px solid var(--border);background:rgba(255,255,255,.6);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);position:sticky;top:0;z-index:50;animation:slideDown .4s ease-out}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.nav-title{font-size:18px;font-weight:bold;color:var(--primary);display:flex;align-items:center;gap:8px}
.nav a{color:var(--text-muted);text-decoration:none;font-size:13px;padding:6px 12px;border-radius:8px;transition:var(--transition)}
.nav a:hover{color:var(--primary);background:rgba(124,107,170,.06)}
.nav a.active{color:var(--primary);background:rgba(124,107,170,.1);font-weight:600}

.container{max-width:620px;margin:0 auto;padding:24px 20px}

/* Cards */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:16px;box-shadow:var(--shadow-sm);transition:var(--transition);animation:fadeUp .5s ease-out backwards}
.card:nth-child(1){animation-delay:.05s}
.card:nth-child(2){animation-delay:.1s}
.card:nth-child(3){animation-delay:.15s}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.card:hover{box-shadow:var(--shadow-md);border-color:var(--primary-lighter);transform:translateY(-1px)}
.card-label{color:var(--primary-light);font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;font-weight:600;display:flex;align-items:center;gap:6px}

/* Buttons */
.btn{border:none;border-radius:8px;padding:9px 20px;cursor:pointer;font-size:12px;font-family:inherit;transition:var(--transition);position:relative;overflow:hidden}
.btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,.2);transform:scaleX(0);transform-origin:left;transition:transform .3s ease}
.btn:active::after{transform:scaleX(1);transition:transform .05s}
.btn-primary{background:linear-gradient(135deg,var(--primary-light),var(--primary));color:#fff;box-shadow:0 2px 8px rgba(124,107,170,.25)}
.btn-primary:hover{box-shadow:0 4px 16px rgba(124,107,170,.35);transform:translateY(-1px)}
.btn-outline{background:var(--bg-card);color:var(--primary-light);border:1px solid var(--border)}
.btn-outline:hover{border-color:var(--primary-lighter);background:rgba(124,107,170,.04)}
.btn-sm{padding:5px 12px;font-size:11px;border-radius:6px}
.btn-danger{background:transparent;color:var(--danger);border:1px solid transparent;padding:4px 8px;font-size:13px}
.btn-danger:hover{background:rgba(212,160,176,.08)}
.btn-group{display:flex;gap:10px;margin-bottom:18px}

/* Peer table */
table{width:100%;border-collapse:collapse;font-size:12px}
th{color:var(--text-muted);border-bottom:1px solid var(--border-light);text-align:left;padding:6px 10px;font-weight:500;font-size:11px}
td{padding:8px 10px;border-bottom:1px solid var(--border-light);transition:var(--transition)}
tr:hover td{background:rgba(124,107,170,.03)}
td.mac{color:var(--primary);font-weight:500;font-size:11px;font-family:inherit}
.tag{background:linear-gradient(135deg,var(--border-light),rgba(196,181,224,.5));padding:3px 10px;border-radius:6px;color:var(--primary);font-size:11px;font-weight:500;display:inline-block}

/* Toggle switch */
.toggle{position:relative;width:36px;height:20px;display:inline-block;cursor:pointer}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-track{position:absolute;inset:0;background:var(--border-light);border-radius:10px;transition:var(--transition)}
.toggle-track::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.15);transition:var(--transition)}
.toggle input:checked+.toggle-track{background:var(--success)}
.toggle input:checked+.toggle-track::after{transform:translateX(16px)}

/* Input */
input[type=text]{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:12px;font-family:inherit;flex:1;transition:var(--transition);outline:none}
input[type=text]:focus{border-color:var(--primary-light);box-shadow:0 0 0 3px rgba(124,107,170,.1);background:#fff}
input[type=text]::placeholder{color:var(--text-muted)}

/* Log box */
.log-box{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:11px;color:var(--text-muted);max-height:160px;overflow-y:auto;scroll-behavior:smooth}
.log-box::-webkit-scrollbar{width:4px}
.log-box::-webkit-scrollbar-track{background:transparent}
.log-box::-webkit-scrollbar-thumb{background:var(--primary-lighter);border-radius:2px}
.log-entry{margin-bottom:3px;animation:logIn .3s ease-out}
.log-recv{color:var(--info)}
.log-ok{color:var(--success)}
.log-fail{color:var(--danger)}
.log-send{color:var(--primary)}
.log-sys{color:var(--text-muted)}
@keyframes logIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}

.send-row{display:flex;gap:8px;margin-bottom:12px}
.empty{text-align:center;padding:12px;color:var(--primary-lighter);font-size:11px}

/* Scan animation */
.scanning{animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}

/* Modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(74,64,96,.25);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:100;opacity:0;transition:opacity .25s ease;pointer-events:none}
.modal-backdrop.open{opacity:1;pointer-events:auto}
.modal-content{background:var(--bg-card);border-radius:var(--radius);padding:24px;max-width:400px;margin:80px auto;border:1px solid var(--border);box-shadow:var(--shadow-lg);transform:translateY(20px) scale(.97);transition:transform .3s cubic-bezier(.4,0,.2,1),opacity .25s ease;opacity:0}
.modal-backdrop.open .modal-content{transform:translateY(0) scale(1);opacity:1}

/* Scan result items */
.scan-item{padding:6px 0;display:flex;align-items:center;gap:8px;animation:fadeUp .3s ease-out backwards}
.scan-item:nth-child(n){animation-delay:calc(.04s * var(--i,0))}
.scan-item .rssi{color:var(--text-muted);font-size:11px}
.scan-add{cursor:pointer;opacity:.7;transition:var(--transition)}
.scan-add:hover{opacity:1}

/* Device info bar */
.device-bar{display:flex;align-items:center;gap:12px;padding:10px 16px;background:rgba(255,255,255,.5);border:1px solid var(--border-light);border-radius:10px;margin-bottom:16px;font-size:11px;animation:fadeUp .4s ease-out backwards}
.device-bar .mac{color:var(--primary);font-weight:500}
.device-bar .label-tag{background:var(--border-light);padding:2px 8px;border-radius:4px;color:var(--primary-light)}

/* Toast */
.toast-wrap{position:fixed;top:70px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;align-items:center;gap:6px;pointer-events:none}
.toast{padding:8px 18px;border-radius:8px;font-size:12px;font-family:inherit;animation:toastIn .3s ease-out,toastOut .3s ease-in forwards;animation-delay:0s,2.5s;pointer-events:auto;box-shadow:var(--shadow-md);max-width:360px;text-align:center}
.toast-ok{background:var(--success);color:#fff}
.toast-err{background:var(--danger);color:#fff}
@keyframes toastIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0}}
</style>
</head>
<body>
<div class="toast-wrap" id="toast-wrap"></div>
<div class="nav">
  <div class="nav-title">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
    ESP-NOW Manager
  </div>
  <div style="display:flex;gap:4px">
    <a href="/monitor">&#10047; Monitor</a>
    <a href="/espnow" class="active">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:2px"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
      ESP-NOW
    </a>
  </div>
</div>

<div class="container">
  <!-- Device info -->
  <div class="device-bar" id="device-bar">
    <span style="color:var(--text-muted)">This device:</span>
    <span class="mac" id="local-mac">--:--:--:--:--:--</span>
    <span class="label-tag" id="local-label">--</span>
  </div>

  <!-- Actions -->
  <div class="btn-group">
    <button class="btn btn-primary" id="scan-btn" onclick="doScan()">Scan</button>
    <button class="btn btn-outline" onclick="showAddDialog()">+ Add Peer</button>
  </div>

  <!-- Scan results -->
  <div class="card">
    <div class="card-label">Scanned Devices</div>
    <div class="empty" id="scan-results">Click "Scan" to discover ESP-NOW devices</div>
  </div>

  <!-- Peer list -->
  <div class="card">
    <div class="card-label">Peer List</div>
    <table>
      <thead><tr><th>MAC</th><th>Label</th><th>Enable</th><th></th></tr></thead>
      <tbody id="peer-list"></tbody>
    </table>
    <div class="empty" id="peer-empty" style="display:none">No peers added</div>
  </div>

  <!-- Test send -->
  <div class="card">
    <div class="card-label">ESP-NOW Test</div>
    <div class="send-row">
      <input type="text" id="target-mac" placeholder="Target MAC (AA:BB:CC:DD:EE:FF)">
      <input type="text" id="send-data" placeholder="Data" style="max-width:120px">
      <button class="btn btn-primary btn-sm" onclick="doTestSend()">Send</button>
    </div>
    <div class="log-box" id="espnow-log">
      <div class="log-sys">// ESP-NOW test log</div>
    </div>
  </div>
</div>

<!-- Add peer modal -->
<div class="modal-backdrop" id="add-dialog">
  <div class="modal-content">
    <div class="card-label" style="margin-bottom:14px;font-size:13px">Add Peer</div>
    <input type="text" id="add-mac" placeholder="AA:BB:CC:DD:EE:FF" style="width:100%;margin-bottom:10px">
    <input type="text" id="add-label" placeholder="Label (optional)" style="width:100%;margin-bottom:16px">
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-outline" onclick="hideAddDialog()">Cancel</button>
      <button class="btn btn-primary" onclick="doAddPeer()">Add</button>
    </div>
  </div>
</div>

<script>
/* ---- Toast ---- */
function toast(msg, ok){
  var wrap=document.getElementById('toast-wrap');
  var el=document.createElement('div');
  el.className='toast '+(ok?'toast-ok':'toast-err');
  el.textContent=msg;
  wrap.appendChild(el);
  setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el)},3000);
}

/* ---- Load device info ---- */
function loadDeviceInfo(){
  fetch('/api/system/status').then(r=>r.json()).then(function(d){
    if(d.mac)document.getElementById('local-mac').textContent=d.mac;
    if(d.label)document.getElementById('local-label').textContent=d.label;
  }).catch(function(){});
}
loadDeviceInfo();

/* ---- Load peer list ---- */
function loadPeers(){
  fetch('/api/espnow/peers').then(r=>r.json()).then(function(d){
    var tbody=document.getElementById('peer-list');
    var empty=document.getElementById('peer-empty');
    if(!d.peers||!d.peers.length){tbody.innerHTML='';empty.style.display='block';return}
    empty.style.display='none';
    tbody.innerHTML=d.peers.map(function(p,i){
      return '<tr style="animation:fadeUp .3s ease-out '+i*0.04+'s backwards">'
        +'<td class="mac">'+p.mac+'</td>'
        +'<td><span class="tag">'+p.label+'</span></td>'
        +'<td><label class="toggle"><input type="checkbox" '+(p.enabled?'checked':'')+' onchange="togglePeer(\''+p.mac+'\','+!p.enabled+')"><span class="toggle-track"></span></label></td>'
        +'<td><button class="btn-danger" onclick="doRemove(\''+p.mac+'\')">&#10005;</button></td>'
        +'</tr>';
    }).join('');
  }).catch(function(){});
}

/* ---- Toggle peer enable/disable ---- */
function togglePeer(mac,enable){
  var url=enable?'/api/espnow/peer/enable':'/api/espnow/peer/disable';
  var action=enable?'Enable':'Disable';
  fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mac:mac})})
  .then(function(r){return r.json()})
  .then(function(d){
    if(d.ok){toast(action+'d '+mac,true);loadPeers()}
    else toast(action+' failed: '+(d.error||'unknown'),false);
  })
  .catch(function(){toast(action+' request error',false)});
}

/* ---- Scan ---- */
function doScan(){
  var el=document.getElementById('scan-results');
  var btn=document.getElementById('scan-btn');
  btn.disabled=true;btn.textContent='Scanning...';btn.classList.add('scanning');
  el.innerHTML='<span class="scanning">Scanning for ESP-NOW devices...</span>';

  fetch('/api/espnow/scan',{method:'POST'}).then(function(r){return r.json()}).then(function(d){
    btn.disabled=false;btn.textContent='Scan';btn.classList.remove('scanning');
    if(d.devices&&d.devices.length){
      toast('Scan found '+d.devices.length+' device'+(d.devices.length>1?'s':''),true);
      el.innerHTML=d.devices.map(function(d,i){
        return '<div class="scan-item" style="--i:'+i+'">'
          +'<span class="mac">'+d.mac+'</span>'
          +(d.label?' <span class="tag">'+d.label+'</span>':'')
          +' <span class="rssi">RSSI: '+d.rssi+'</span>'
          +' <span class="tag scan-add" onclick="addFromScan(\''+d.mac+'\',\''+(d.label||'')+'\')">+ Add</span>'
          +'</div>';
      }).join('');
    }else{
      toast('Scan complete, no devices found',true);
      el.textContent='No devices found';
    }
  }).catch(function(e){
    btn.disabled=false;btn.textContent='Scan';btn.classList.remove('scanning');
    el.textContent='Scan failed';toast('Scan request error',false);
  });
}

function addFromScan(mac,label){
  document.getElementById('add-mac').value=mac;
  if(label)document.getElementById('add-label').value=label;
  showAddDialog();
}

/* ---- Add peer ---- */
function showAddDialog(){document.getElementById('add-dialog').classList.add('open')}
function hideAddDialog(){document.getElementById('add-dialog').classList.remove('open');document.getElementById('add-mac').value='';document.getElementById('add-label').value=''}
document.getElementById('add-dialog').addEventListener('click',function(e){if(e.target===this)hideAddDialog()});

function doAddPeer(){
  var mac=document.getElementById('add-mac').value.trim();
  var label=document.getElementById('add-label').value.trim();
  if(!mac){document.getElementById('add-mac').style.borderColor='var(--danger)';return}
  fetch('/api/espnow/peer/add',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mac:mac,label:label||mac})})
  .then(function(r){return r.json()})
  .then(function(d){
    if(d.ok){toast('Peer added: '+mac,true);hideAddDialog();loadPeers()}
    else toast('Add failed: '+(d.error||'unknown'),false);
  })
  .catch(function(){toast('Add request error',false)});
}

/* ---- Remove peer ---- */
function doRemove(mac){
  fetch('/api/espnow/peer/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mac:mac})})
  .then(function(r){return r.json()})
  .then(function(d){
    if(d.ok){toast('Peer removed: '+mac,true);loadPeers()}
    else toast('Remove failed: '+(d.error||'unknown'),false);
  })
  .catch(function(){toast('Remove request error',false)});
}

/* ---- ESP-NOW test send ---- */
function doTestSend(){
  var mac=document.getElementById('target-mac').value.trim();
  var data=document.getElementById('send-data').value.trim();
  if(!mac||!data)return;

  fetch('/api/espnow/test/send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mac:mac,data:data})})
  .then(function(r){return r.json()})
  .then(function(d){
    var log=document.getElementById('espnow-log');
    var ts=new Date().toLocaleTimeString();
    var entry=document.createElement('div');
    entry.className='log-entry '+(d.ok?'log-ok':'log-fail');
    entry.textContent='['+ts+'] '+(d.ok?'OK':'FAIL')+' -> '+mac+': '+data;
    log.appendChild(entry);log.scrollTop=log.scrollHeight;
    toast(d.ok?'Sent to '+mac:'Send failed: '+(d.error||'unknown'),d.ok);
  }).catch(function(){toast('Send request error',false)});
}

loadPeers();
setInterval(loadPeers,10000);
</script>
</body>
</html>
